<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>theme1</title>
</head>
<body>
<style>
body{
    background:#11161d;
    color:white;
    font-family:'Segoe UI',sans-serif;
}

.container{
    width:85%;
    margin:auto;
    padding:40px 0;
}

.breadcrumbs{
    color:#697483;
    margin-bottom:25px;
}

.lesson-title{
    font-size:42px;
    margin-bottom:35px;
    line-height:1.3;
}

.video-block{
    background:#11161d;
    padding:20px;
    border-radius:16px;
    margin-bottom:40px;
}

.video-block iframe{
    width:100%;
    height:650px;
    border:none;
    border-radius:12px;
}

#tests{
    position: relative;
            padding: 22px 44px;
            color: #fff;
            background-color: rgb(0, 0, 0);
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            font-family: "Segoe UI", sans-serif;
           
}

#tests:hover{
    transform: translateY(-5px);
}
.breadcrumbs a {
    color: #e3a857; /* Оранжево-желтый оттенок для активной ссылки */
    text-decoration: none;
}

</style>

<div class="container">

    <nav class="breadcrumbs">
            <a href="modules1.html">Видеосабақтар</a> &gt; <span>Тақырып 1</span>
        </nav>

    <div class="video-block">

        <iframe
        width="100%"
        height="600"    
        src="https://www.youtube.com/embed/GDlb8Bkaaek"
            allowfullscreen>
        </iframe>
  

    </div>

    <div class="questions">

        <button id="tests">Бақылау сұрақтары</button>

        
    </div>

</div>
<script>
    const tst = document.getElementById('tests');
tst.addEventListener('click', () => {
            window.location.href = "https://docs.google.com/document/d/1qgG4Z6y82-gSYpDXYHL6nFZ7F9ksyQsl/edit?usp=drive_link&ouid=106981742527988327427&rtpof=true&sd=true";

})
</script>
</body>
</html>
